apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: backend
          image: 033462814952.dkr.ecr.ap-southeast-2.amazonaws.com/backend:v1.0.0
          ports:
            - containerPort: 6200
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef: # Reference ConfigMap key
                  name: backend-configmap
                  key: PORT
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: backend
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 6200 # internal cluster port
      targetPort: 6200 # container port
      nodePort: 32001 # port on the node to access externally
